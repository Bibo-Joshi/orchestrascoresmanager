name: Setup Copilot Environment

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to setup'
        required: false
        type: string
        default: '8.4'
      node-version:
        description: 'Node.js version to setup'
        required: false
        type: string
        default: ''
      npm-version:
        description: 'npm version to setup'
        required: false
        type: string
        default: ''
      install-php:
        description: 'Whether to install PHP dependencies'
        required: false
        type: boolean
        default: true
      install-node:
        description: 'Whether to install Node.js dependencies'
        required: false
        type: boolean
        default: true

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      # PHP Setup
      - name: Set up PHP ${{ inputs.php-version }}
        if: inputs.install-php
        uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a # v2.33.0
        with:
          php-version: ${{ inputs.php-version }}
          extensions: bz2, ctype, curl, dom, fileinfo, gd, iconv, intl, json, libxml, mbstring, openssl, pcntl, posix, session, simplexml, xmlreader, xmlwriter, zip, zlib, sqlite, pdo_sqlite
          coverage: none
          ini-file: development
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get composer cache directory
        if: inputs.install-php
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        if: inputs.install-php
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        if: inputs.install-php
        run: composer install --no-interaction --prefer-dist

      # Node.js Setup
      - name: Read package.json node and npm engines version
        if: inputs.install-node && inputs.node-version == ''
        uses: skjnldsv/read-package-engines-version-actions@06d6baf7d8f41934ab630e97d9e6c0bc9c9ac5e4 # v3
        id: node-versions
        with:
          fallbackNode: '^22'
          fallbackNpm: '^10'

      - name: Set up Node.js
        if: inputs.install-node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node-version || steps.node-versions.outputs.nodeVersion }}
          cache: 'npm'

      - name: Set up npm
        if: inputs.install-node && (inputs.npm-version != '' || steps.node-versions.outputs.npmVersion != '')
        run: npm i -g 'npm@${{ inputs.npm-version || steps.node-versions.outputs.npmVersion }}'

      - name: Install Node.js dependencies
        if: inputs.install-node
        env:
          CYPRESS_INSTALL_BINARY: 0
          PUPPETEER_SKIP_DOWNLOAD: true
        run: npm ci
